    </div>

    <div class="nav-actions">
        @if (displayName) {

                    {{ initials }}
                </div>
            </div>

            <!-- <button class="logout-link" (click)="logout()">
                <i class="ph ph-sign-out"></i> Logout
            </button> -->
        } @else {

        }
    </div>
</nav>
