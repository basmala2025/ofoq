<div class="course-selection-container">
  <div class="course-box">
    <h2>Select Your Courses</h2>
    <p>Choose your academic year and enrolled courses</p>

    <div class="year-selection">
      <h3>Academic Year</h3>
      <div class="year-grid">
        <button
          *ngFor="let year of years"
          class="year-btn"
          [class.selected]="selectedYear === year"
          (click)="selectedYear = year">
          {{ year | ordinal }} Year
        </button>
      </div>
    </div>

    <div class="course-list">
      <h3>Enrolled Courses</h3>
      <div class="course-item" *ngFor="let course of courses | keyvalue">
        <input type="checkbox" [id]="'course-' + course.key" [(ngModel)]="course.value">
        <i class="fas fa-book"></i>
        <label [for]="'course-' + course.key">{{ course.key | titlecase | space }}</label>
      </div>
    </div>

    <div class="button-group">
      <button class="btn btn-outline" routerLink="/signup">Back</button>
      <button class="submit-btn" (click)="goToDashboard()">Go to Dashboard</button>
    </div>
  </div>
</div>
