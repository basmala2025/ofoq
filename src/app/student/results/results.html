<div id="results-page" class="results-page-wrapper">
  <!-- <nav class="navbar">
    <div class="navbar-content">
      <div class="navbar-brand">
        <i class="fas fa-code"></i>
        <span>CodeExam Platform</span>
      </div>
    </div>
  </nav> -->

  <div class="results-container">
    <div class="results-box">
      <div class="results-header">
        <!-- <div class="results-icon" [class.failed-icon]="score < 50">
          <i [class]="score >= 50 ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'"></i>
        </div> -->
        <h1>Exam Completed!</h1>
        <p>{{ examTitle }} - {{ category }}</p>
      </div>

      <div class="score-banner">
        <div class="score-value">{{ score }}%</div>
        <div class="score-label">Your Overall Score</div>
      </div>

      <div class="results-section">
        <h3>Test Cases Analysis</h3>
        <div *ngFor="let test of testCases" class="result-item" [ngClass]="test.passed ? 'passed' : 'failed'">
          <div class="result-item-content">
            <i [class]="test.passed ? 'fas fa-check-circle' : 'fas fa-times-circle'"></i>
            <span>{{ test.name }}</span>
          </div>
          <span class="status">{{ test.status }}</span>
        </div>
      </div>

      <div class="stats-mini-grid">
        <div class="stat-mini">
          <div class="stat-mini-value">{{ timeTaken }}</div>
          <div class="stat-mini-label">Time Taken</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-value">{{ passedCount }}/{{ testCases.length }}</div>
          <div class="stat-mini-label">Tests Passed</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-value">{{ totalLines }}</div>
          <div class="stat-mini-label">Lines of Code</div>
        </div>
      </div>

      <div class="button-group">
       
        <button class="btn btn-primary" (click)="goHome()">
          <i class="fas fa-home"></i> Back to Dashboard
        </button>
      </div>
    </div>
  </div>
</div>
