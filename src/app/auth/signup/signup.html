<app-navbar></app-navbar>

<div class="container">
    <div class="logo">
        <img src="logo-removebg-preview.png" alt="OFOQ" width="100px">
        <h1>{{ pageTitle() }}</h1>
    </div>

    @if (isInvited()) {
        <p class="invitation-msg">Welcome! Please complete your information to activate your institutional access.</p>
    }

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label for="fullname">Full Name</label>
            <div class="input-wrapper" [class.is-invalid]="signupForm.get('fullName')?.invalid && signupForm.get('fullName')?.touched">
                <input type="text" id="fullname" formControlName="fullName" placeholder="e.g., Dr. Ahmed Ali">
            </div>
        </div>

        <div class="form-group">
            <label for="academicId">Academic ID / Code</label>
            <div class="input-wrapper" [class.is-invalid]="signupForm.get('id')?.invalid && signupForm.get('id')?.touched">
                <input type="text" id="academicId" formControlName="id" placeholder="Enter your ID number">
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper"
                 [class.is-invalid]="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
                 [class.read-only-field]="isInvited()">
                <input type="email" id="email" formControlName="email"
                       [readonly]="isInvited()"
                       placeholder="example@edu.bu.eg">
            </div>
            @if (signupForm.get('email')?.touched && signupForm.get('email')?.invalid && !isInvited()) {
                <div class="error-box">
                    <span class="error-text">Please use your university email (.edu.bu.eg).</span>
                </div>
            }
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper" [class.is-invalid]="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">
                <input type="password" id="password" formControlName="password" placeholder="••••••••">
            </div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper" [class.is-invalid]="signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched">
                <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="••••••••">
            </div>
        </div>

        <button type="submit" class="submit-btn" [disabled]="signupForm.invalid || isLoading">
            {{ isLoading ? 'Processing...' : (isInvited() ? 'Activate Account' : 'Create Account') }}
        </button>
    </form>

    <div class="form-footer" *ngIf="!isInvited()">
        Already have an account? <a [routerLink]="['/login']">Login</a>
    </div>
</div>
