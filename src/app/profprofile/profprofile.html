<div id="profileView" class="view active">
    <div class="page-header">
        <button class="back-btn" routerLink="/dashboard">← Back to Dashboard</button>
    </div>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">{{ doctor.avatar }}</div>
                <h2 class="page-title" style="font-size: 1.5rem; margin: 0;">{{ doctor.name }}</h2>
            </div>

            <div class="profile-info">
                <div class="info-group">
                    <div class="info-label">Full Name</div>
                    <div class="info-value">{{ doctor.fullName }}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Academic Email</div>
                    <div class="info-value">{{ doctor.email }}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Department</div>
                    <div class="info-value">{{ doctor.department }}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Position</div>
                    <div class="info-value">{{ doctor.position }}</div>
                </div>
            </div>
        </div>

        <div>
            <div class="profile-card" style="margin-bottom: 2rem;">
                <h3 class="section-title">Assigned Courses</h3>
                <ul class="course-list">
                    @for (course of assignedCourses; track course.id) {
                        <li>
                            <div>
                                <div class="course-list-name">{{ course.name }}</div>
                                <div class="course-list-code">{{ course.code }}</div>
                            </div>
                        </li>
                    }
                </ul>
            </div>
